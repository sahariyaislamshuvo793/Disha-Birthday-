<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Diaha 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff5f9e,#7f5cff);
    overflow:hidden;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    font-size:50px;
    margin-bottom:15px;
}

p{
    font-size:22px;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#fff;
    color:#ff4081;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.balloon{
    position:absolute;
    bottom:-150px;
    font-size:35px;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<div class="card">
<h1>🎂 Happy Birthday Diaha 🎉</h1>
<p>May your life be filled with happiness, love and success. 💖</p>

<button onclick="wish()">Open Surprise 🎁</button>
</div>

<script>
function wish(){
    alert("🎉 Happy Birthday Diaha! 🎂\nWishing you endless happiness and success. ❤️");
}

const emojis=["🎈","🎉","🎊","💖","🎂"];
for(let i=0;i<30;i++){
    const e=document.createElement("div");
    e.className="balloon";
    e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(5+Math.random()*5)+"s";
    e.style.fontSize=(25+Math.random()*25)+"px";
    document.body.appendChild(e);
}
</script>

</body>
</html>
