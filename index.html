<!-- 🤖 AI CHATBOX WIDGET -->
<style>
    :root {
        --ai-primary: #00f3ff;
        --ai-accent: #7000ff;
        --ai-bg: rgba(10, 10, 25, 0.95);
    }

    /* Floating Chat Icon */
    .ai-toggle-btn {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--ai-primary), var(--ai-accent));
        border: 2px solid #fff;
        color: #fff;
        font-size: 1.6rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 0 25px rgba(0, 243, 255, 0.5);
        z-index: 9999;
        transition: all 0.3s ease;
    }
    .ai-toggle-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 35px rgba(255, 0, 85, 0.7);
    }

    /* Chat Box Container */
    .ai-chat-box {
        position: fixed;
        bottom: 100px;
        left: 30px;
        width: 350px;
        height: 480px;
        background: var(--ai-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--ai-primary);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        z-index: 9998;
        opacity: 0;
        pointer-events: none;
        transform: translateY(20px);
        transition: all 0.3s ease;
    }
    .ai-chat-box.active {
        opacity: 1;
        pointer-events: all;
        transform: translateY(0);
    }

    /* Header */
    .ai-header {
        background: linear-gradient(90deg, var(--ai-accent), var(--ai-primary));
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
    }
    .ai-close-btn {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.3rem;
        cursor: pointer;
    }

    /* Messages Area */
    .ai-messages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.95rem;
        color: #fff;
    }
    .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        line-height: 1.4;
    }
    .msg.bot {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(0, 243, 255, 0.3);
        align-self: flex-start;
        border-bottom-left-radius: 2px;
    }
    .msg.user {
        background: linear-gradient(135deg, var(--ai-primary), var(--ai-accent));
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
    }

    /* Input Footer */
    .ai-input-area {
        display: flex;
        padding: 10px;
        background: rgba(0,0,0,0.4);
        border-top: 1px solid rgba(255,255,255,0.1);
    }
    .ai-input-area input {
        flex: 1;
        background: transparent;
        border: none;
        color: #fff;
        padding: 8px 12px;
        outline: none;
        font-size: 0.95rem;
    }
    .ai-send-btn {
        background: var(--ai-primary);
        border: none;
        color: #000;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
    }
</style>

<!-- HTML Structure -->
<button class="ai-toggle-btn" id="aiToggleBtn" title="Chat with AI"><i class="fas fa-robot"></i></button>

<div class="ai-chat-box" id="aiChatBox">
    <div class="ai-header">
        <span><i class="fas fa-microchip"></i> Shuvo's Smart AI</span>
        <button class="ai-close-btn" id="aiCloseBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="ai-messages" id="aiMessages">
        <div class="msg bot">হ্যালো! আমি শাহরিয়ার ইসলাম শুভ-এর এআই অ্যাসিস্ট্যান্ট। শুভ কেমন আছে, কোথায় থাকে বা যেকোনো বিষয়ে আমাকে প্রশ্ন করতে পারো!</div>
    </div>
    <div class="ai-input-area">
        <input type="text" id="aiInput" placeholder="এখানে কিছু লিখুন...">
        <button class="ai-send-btn" id="aiSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- JavaScript Logic (Everything Q/A handled here) -->
<script>
    const aiToggleBtn = document.getElementById('aiToggleBtn');
    const aiChatBox = document.getElementById('aiChatBox');
    const aiCloseBtn = document.getElementById('aiCloseBtn');
    const aiSendBtn = document.getElementById('aiSendBtn');
    const aiInput = document.getElementById('aiInput');
    const aiMessages = document.getElementById('aiMessages');

    aiToggleBtn.addEventListener('click', () => aiChatBox.classList.toggle('active'));
    aiCloseBtn.addEventListener('click', () => aiChatBox.classList.remove('active'));

    function handleSend() {
        const text = aiInput.value.trim();
        if(!text) return;

        appendMsg(text, 'user');
        aiInput.value = '';

        // AI Smart Brain - Everything Q/A Logic
        setTimeout(() => {
            let reply = "দারুণ একটা প্রশ্ন করেছো! এই বিষয়ে বিস্তারিত জানতে শুভ-এর সাথে সরাসরি যোগাযোগ করতে পারো।";
            const q = text.toLowerCase();

            // ১. কেমন আছেন / কেমন আছো
            if (q.includes('কেমন') || q.includes('kmn') || q.includes('bhalo') || q.includes('how are')) {
                reply = "আলহামদুলিল্লাহ, শুভ একদম ভালো এবং সুস্থ আছে! তুমি কেমন আছো?";
            } 
            // ২. কোথায় থাকেন / বাসা কোথায় / কোথায় থাকে
            else if (q.includes('কোথায়') || q.includes('kothay') || q.includes('thake') || q.includes('basha') || q.includes('where')) {
                reply = "শাহরিয়ার ইসলাম শুভ মূলত বাংলাদেশে থাকে এবং বিভিন্ন সুন্দর জায়গায় ঘুরে বেড়াতে ভালোবাসে!";
            } 
            // ৩. নাম কি
            else if (q.includes('নাম') || q.includes('name') || q.includes('ke tumi')) {
                reply = "আমার নাম স্মার্ট এআই, আর ওয়েবসাইটের মূল কর্ণধার হলো শাহরিয়ার ইসলাম শুভ।";
            } 
            // ৪. কি করেন / পেশা
            else if (q.includes('কিসব') || q.includes('কাজের') || q.includes('কী করো') || q.includes('ki koro') || q.includes('work') || q.includes('job')) {
                reply = "শুভ একজন শিক্ষার্থী (Student) এবং ফ্রিল্যান্সার। পাশাপাশি সে বাংলাদেশের বিভিন্ন জেলা ঘুরে বেড়াতে পছন্দ করে!";
            } 
            // ৫. ভ্রমণ / ঘোরাঘুরি
            else if (q.includes('ঘোরা') || q.includes('travel') || q.includes('district') || q.includes('জেলা')) {
                reply = "শুভ ট্রাভেল করতে ভীষণ ভালোবাসে! সে ইতিমধ্যে বাংলাদেশের ৬৪টি জেলার মধ্যে ৪১টি জেলা ঘুরে ফেলেছে।";
            } 
            // ৬. যোগাযোগ / ফেসবুক
            else if (q.includes('যোগাযোগ') || q.includes('contact') || q.includes('facebook') || q.includes('inbox')) {
                reply = "তুমি ওয়েবসাইটের ডানপাশের ফ্লোটিং সোশ্যাল আইকন থেকে সরাসরি শুভ-এর ফেসবুক বা হোয়াটসঅ্যাপে নক করতে পারো!";
            }

            appendMsg(reply, 'bot');
        }, 500);
    }

    function appendMsg(msg, sender) {
        const div = document.createElement('div');
        div.classList.add('msg', sender);
        div.textContent = msg;
        aiMessages.appendChild(div);
        aiMessages.scrollTop = aiMessages.scrollHeight;
    }

    aiSendBtn.addEventListener('click', handleSend);
    aiInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
