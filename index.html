<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahariya Islam Shuvo | Portfolio</title>
    <!-- Icons & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --accent: #7000ff;
            --bg-dark: #030308;
            --card-bg: rgba(15, 15, 30, 0.65);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: #a0a0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Floating Social Bar */
        .social-bar {
            position: fixed;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 1000;
        }

        .social-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .social-btn:hover {
            transform: scale(1.15) translateX(-5px);
            color: var(--primary);
            border-color: var(--primary);
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2rem;
            margin: 40px 0 20px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Facebook Feed Box Styling */
        .feed-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            min-height: 300px;
        }
    </style>
</head>
<body>

    <!-- Floating Social Icons -->
    <div class="social-bar">
        <a href="https://www.facebook.com/share/17oWxW3oHG/" target="_blank" class="social-btn" title="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/sahariyashuvo_?igsh=MWRoNjNhdnlhOTg2YQ==" target="_blank" class="social-btn" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/8801791996607" target="_blank" class="social-btn" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="container">
        
        <h2 class="section-title">Latest Facebook Posts</h2>
        <p style="text-align: center; color: var(--text-sub);">আমার ফেসবুকের নতুন আপডেট ও পোস্টসমূহ</p>

        <!-- Facebook Social Feed Area -->
        <div class="feed-container">
            <!-- Curator.io Embed Feed Container -->
            <div id="curator-feed-default-feed-layout">
                <a href="https://curator.io" target="_blank" class="crt-logo crt-tag" style="display:none;">Powered by Curator.io</a>
            </div>
        </div>

    </div>

    <!-- Curator.io Social Feed Script -->
    <script type="text/javascript">
    (function(){
        var i, e, d = document, s = "script";
        i = d.createElement("script");
        i.async = 1;
        i.charset = "UTF-8";
        i.src = "https://cdn.curator.io/published/a658d5ef-e6b7-4402-998b-240166cb0211.js";
        e = d.getElementsByTagName(s)[0];
        e.parentNode.insertBefore(i, e);
    })();
    </script>

</body>
</html>
